server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # The SPA calls the backend directly at https://api.rwandaavocados.rw
    # (baked in at build time via VITE_API_BASE_URL) — no local reverse
    # proxy is needed since there's no sibling "api" container in this deploy.

    # SPA fallback: let react-router handle client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed static assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
